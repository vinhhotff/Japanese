<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect all 404s to index.html
      // so that React Router can handle the routing.
      //
      // This is the standard approach for single-page apps on GitHub Pages.
      // The URL in the browser's address bar is preserved (e.g. /register),
      // and React Router takes over from there.
      //
      // If the user is NOT logged in and the route is protected, React Router
      // will redirect to /login. If the route is public (like /register),
      // it will show the Register page correctly.
      sessionStorage.redirect = window.location.href;
      window.location.href = '/index.html';
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
