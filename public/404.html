<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect all 404s to index.html
      // so that React Router can handle the routing.
      //
      // The key is using the ABSOLUTE path /Japanese/index.html so the redirect
      // ALWAYS lands on the correct index.html, regardless of which route
      // triggered the 404 (e.g. /Japanese/register → /Japanese/index.html).
      //
      // If the site is at root instead, update base to '' and path to '/index.html'.
      sessionStorage.redirect = window.location.href;
      window.location.href = '/Japanese/index.html';
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
