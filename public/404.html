<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script>
      // GitHub Pages SPA fallback: redirect all 404s to index.html
      // so that React Router can handle the routing.
      //
      // Auto-detects the base path from the current URL pathname:
      // - Vercel (root): /register → base="/" → redirect to /index.html
      // - GitHub Pages (/Japanese/): /Japanese/register → base="/Japanese/" → redirect to /Japanese/index.html
      sessionStorage.redirect = window.location.href;
      const pathParts = window.location.pathname.split('/');
      // Remove the last segment (the "file" that was 404), keep the rest as base
      pathParts.pop();
      const base = pathParts.join('/') || '/';
      window.location.href = base + '/index.html';
    </script>
  </head>
  <body>
    <p>Redirecting...</p>
  </body>
</html>
